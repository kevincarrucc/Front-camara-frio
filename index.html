<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login | El Abuelo Distribuciones</title>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="Index.css?v=6">
        <!-- Iconos -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body>

        <header>
            <img src="imagenes/logo.jpg" alt="Logo El Abuelo Distribuciones" class="logo">
            <div class="menu-toggle" onclick="toggleMenu()">☰</div>
            <nav id="mobileMenu">
                <a href="">Inicio</a>
                <a href="">Temperatura</a>
                <a href="">Consumo Eléctrico</a>
                <a href="">Historicos</a>
                <a href="" onclick="logout()">Cerrar sesión</a>
            </nav>
            <div class="menu-overlay" onclick="toggleMenu()"></div>
        </header>


        <section class="login">

            <div class="login-box">

                <h1>Iniciar Sesión</h1>

                <form id="loginForm">

                    <div class="input-group">
                        <i class="fa fa-user"></i>
                        <input type="text" id="username" placeholder="Usuario" required>
                    </div>

                    <div class="input-group">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="password" placeholder="Contraseña" required>
                    </div>

                    <div class="show-pass">
                        <input type="checkbox" id="mostrar">
                        <label for="mostrar">Mostrar contraseña</label>
                    </div>

                    <div id="error-msg" style="display:none; color:red; margin-bottom:10px;">
                        Usuario o contraseña incorrectos
                    </div>
                    <button type="submit">Ingresar</button>

                </form>

            </div>

        </section>

        <footer>
            © 2026 El Abuelo Distribuciones - Todos los derechos reservados
        </footer>

        <script>
            function toggleMenu() {
                const nav = document.getElementById("mobileMenu");
                const overlay = document.querySelector(".menu-overlay");    
                nav.classList.toggle("active");
                overlay.classList.toggle("active");
            }
        </script>

        <script>
            const checkbox = document.getElementById("mostrar");
            const password = document.getElementById("password");
            checkbox.addEventListener("change", function(){
                if(this.checked){
                    password.type = "text";
                }else{
                    password.type = "password";
                }
            });
        </script>

            const DEV_PASS = "1234";

            /* =========================================================
            LOGIN SIMULADO LOCAL
            ========================================================= */

            const form = document.getElementById("loginForm");
            const error = document.getElementById("error-msg");

            form.addEventListener("submit", function(e){
                e.preventDefault();
                const username = document.getElementById("username").value;
                const password = document.getElementById("password").value;

                /* verificación local */
                if(username === DEV_USER && password === DEV_PASS){

                    /* simulamos un token */
                    localStorage.setItem("token", "dev-token-123");

                    /* entrar al sistema */
                    window.location.href = "inicio.html";
                }else{
                    error.style.display = "block";
                }
            });
        </script>
    </body>
</html>
