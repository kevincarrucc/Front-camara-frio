<script>
function mostrarSeccion(event, tipo){

    const todos = document.querySelectorAll(
        '.Temperatura24h-container, .Temperatura1sem-container, .Temperatura1mes-container, \
         .Tensión24h-container, .Tensión1sem-container, .Tensión1mes-container, \
         .Corriente24h-container, .Corriente1sem-container, .Corriente1mes-container'
    );

    // 🔴 ocultar todo
    todos.forEach(el => el.classList.add('oculto'));

    // 🟢 mostrar según botón
    if(tipo === 'temp'){
        document.querySelectorAll(
            '.Temperatura24h-container, .Temperatura1sem-container, .Temperatura1mes-container'
        ).forEach(el => el.classList.remove('oculto'));
    }

    if(tipo === 'tension'){
        document.querySelectorAll(
            '.Tensión24h-container, .Tensión1sem-container, .Tensión1mes-container'
        ).forEach(el => el.classList.remove('oculto'));
    }

    if(tipo === 'corriente'){
        document.querySelectorAll(
            '.Corriente24h-container, .Corriente1sem-container, .Corriente1mes-container'
        ).forEach(el => el.classList.remove('oculto'));
    }

    if(tipo === 'eventos'){
        document.getElementById('event-panel')
            .classList.remove('oculto');
    }
    else {
        document.getElementById('event-panel')
            .classList.add('oculto');
    }

    // 🔵 botón activo
    const botones = document.querySelectorAll('.selector-graficos button');
    botones.forEach(btn => btn.classList.remove('activo'));

    if(event){
        event.target.classList.add('activo');
    } else {
        
        document.querySelector('.selector-graficos button')
            .classList.add('activo');
    }
}
</script>

<script>// simulación de eventos cada 3 segundos (después reemplazás por eventos reales del backend)
setInterval(() => {
    const tipos = ["info", "aviso", "alarma"];
    const mensajes = [
        "Sistema iniciado",
        "Temperatura alta",
        "Falla de sensor",
        "Puerta abierta"
    ];

    const tipo = tipos[Math.floor(Math.random() * tipos.length)];
    const mensaje = mensajes[Math.floor(Math.random() * mensajes.length)];

    agregarEvento(mensaje, tipo);
}, 3000);
</script>

<script>// función para agregar eventos al panel de eventos a traves del back
    function agregarEvento(mensaje, tipo) {
    const eventList = document.getElementById("eventList");

    const nuevoEvento = document.createElement("div");
    nuevoEvento.classList.add("event", tipo);

    const fecha = new Date().toLocaleTimeString();

    nuevoEvento.innerHTML = `
        <strong>${fecha}</strong> - ${mensaje}
    `;

    // prepend = lo coloca arriba de todo
    eventList.prepend(nuevoEvento);
}
</script>



<script>
document.addEventListener("DOMContentLoaded", function () {

    const INTERVAL = 600000; // 10 minutos

    // Evento al cargar el gráfico
    const onChartLoad = function () {
        const chart = this;

        const t1 = chart.series[0];
        const t2 = chart.series[1];
        const tProm = chart.series[2];
        const tExt = chart.series[3];

        setInterval(function () {
            const x = (new Date()).getTime();

            // 🔧 Datos simulados (después reemplazás por sensores reales)
            const y1 = Number(document.getElementById("temp1").innerText);   // temp1
            const y2 = 2 + Math.random() * 4;   // temp2
            const yProm = (y1 + y2) / 2;        // promedio
            const yExt = 10 + Math.random() * 10; // exterior

            // Mantener cantidad constante
            const shift = t1.data.length >= 144;

            t1.addPoint([x, y1], true, shift);
            t2.addPoint([x, y2], true, shift);
            tProm.addPoint([x, yProm], true, shift);
            tExt.addPoint([x, yExt], true, shift);

        }, INTERVAL);
    };

    // Datos iniciales
    const dataT1 = [];
    const dataT2 = [];
    const dataProm = [];
    const dataExt = [];

    const time = new Date().getTime();

    for (let i = -144; i <= 0; i++) {
        const x = time + i * INTERVAL;

        const y1 = 2 + Math.random() * 4;
        const y2 = 2 + Math.random() * 4;
        const yProm = (y1 + y2) / 2;
        const yExt = 10 + Math.random() * 10;

        dataT1.push([x, y1]);
        dataT2.push([x, y2]);
        dataProm.push([x, yProm]);
        dataExt.push([x, yExt]);
    }

    Highcharts.chart('container-1', {
        chart: {
            type: 'spline',
            events: {
                load: onChartLoad
            }
        },

        time: {
            useUTC: false
        },

        title: {
            text: 'Histórico de Temperaturas (24 hs)'
        },

        xAxis: {
            type: 'datetime'
        },

        yAxis: {
            title: {
                text: 'Temperatura (°C)'
            }
        },

        legend: {
            enabled: true // 🔥 importante para diferenciar líneas
        },

        exporting: {
            enabled: false
        },

        series: [
            {
                name: 'Temp 1',
                data: dataT1
            },
            {
                name: 'Temp 2',
                data: dataT2
            },
            {
                name: 'Temp Promedio',
                data: dataProm,
                dashStyle: 'ShortDash' // línea punteada
            },
            {
                name: 'Temp Exterior',
                data: dataExt
            }
        ]
    });

});
</script>
