<script>
function mostrarSeccion(event, tipo){

    const todos = document.querySelectorAll(
        '.Temperatura24h-container, .Temperatura1sem-container, .Temperatura1mes-container, \
         .Tensión24h-container, .Tensión1sem-container, .Tensión1mes-container, \
         .Corriente24h-container, .Corriente1sem-container, .Corriente1mes-container, \
         .Potencia24h-container, .Potencia1sem-container, .Potencia1mes-container'
    );

    // 🔴 ocultar todo
    todos.forEach(el => el.classList.add('oculto'));

    // 🟢 mostrar según botón
    if(tipo === 'temp'){
        document.querySelectorAll(
            '.Temperatura24h-container, .Temperatura1sem-container, .Temperatura1mes-container'
        ).forEach(el => el.classList.remove('oculto'));
    }

    if(tipo === 'tension'){
        document.querySelectorAll(
            '.Tensión24h-container, .Tensión1sem-container, .Tensión1mes-container'
        ).forEach(el => el.classList.remove('oculto'));
    }

    if(tipo === 'corriente'){
        document.querySelectorAll(
            '.Corriente24h-container, .Corriente1sem-container, .Corriente1mes-container'
        ).forEach(el => el.classList.remove('oculto'));
    }

    if(tipo === 'potencia'){
            document.querySelectorAll(
                '.Potencia24h-container, .Potencia1sem-container, .Potencia1mes-container'
        ).forEach(el => el.classList.remove('oculto'));
    }

    if(tipo === 'eventos'){
        document.getElementById('event-panel')
            .classList.remove('oculto');
    }
    else {
        document.getElementById('event-panel')
            .classList.add('oculto');
    }

    // 🔵 botón activo
    const botones = document.querySelectorAll('.selector-graficos button');
    botones.forEach(btn => btn.classList.remove('activo'));

    if(event){
        event.target.classList.add('activo');
    } else {
        
        document.querySelector('.selector-graficos button')
            .classList.add('activo');
    }

    setTimeout(() => {
    window.dispatchEvent(new Event('resize'));
    }, 100);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getDatabase, ref, onValue 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import {
    getFirestore,
    collection,
    query,
    orderBy,
    where,
    limit,
    getDocs,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// =========================
// Firebase init
// =========================

const firebaseConfig = {
    apiKey: "AIzaSyA7BNbFNzdARWEGM_dAMKe7WUNUTI_0h-0",
    authDomain: "camara-frio-elabuelo.firebaseapp.com",
    databaseURL: "https://camara-frio-elabuelo-default-rtdb.firebaseio.com",
    projectId: "camara-frio-elabuelo"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const firestore = getFirestore(app);

// =======================
// 🔹 FUNCION UI EVENTOS
// =======================

function formatearFecha(ts){
  const d = ts
    ? new Date(ts.seconds * 1000)
    : new Date();

  const fecha = d.toLocaleDateString();
  const hora  = d.toLocaleTimeString();

  return `${fecha} - ${hora}`;
}

function agregarEvento(mensaje, tipo, timestamp) {
  const eventList = document.getElementById("eventList");

  const nuevoEvento = document.createElement("div");
  nuevoEvento.classList.add("event", tipo);

  const d = timestamp
    ? new Date(timestamp.seconds * 1000)
    : new Date();

  const fecha = d.toLocaleString('es-AR', {
  day: '2-digit',
  month: '2-digit',
  year: 'numeric',
  hour: '2-digit',
  minute: '2-digit',
  second: '2-digit'
});

  nuevoEvento.innerHTML = `
    <strong>${fecha}</strong> - ${mensaje}
  `;

  eventList.prepend(nuevoEvento);
}

// =======================
// 🔹 MAPEO DE TIPOS
// =======================

function mapearTipo(tipoFirestore) {
  switch (tipoFirestore) {
    case "puerta":
    case "luz":
      return "info";

    case "aviso":
      return "aviso";

    case "alarma":
      return "alarma";

    default:
      return "info";
  }
}

// =======================
// 🔹 ESCUCHAR EVENTOS
// =======================

const eventosRef = collection(firestore, "eventos");

const q = query(
  eventosRef,
  orderBy("timestamp", "desc"),
  limit(50)
);

let primeraCarga = true;

onSnapshot(q, (snapshot) => {
     if (primeraCarga) {

    document.getElementById("eventList").innerHTML = "";

    // 🔹 invertir orden para que el más nuevo quede arriba
    const docs = snapshot.docs.reverse();

    docs.forEach(doc => {
      const data = doc.data();

      if (!data.timestamp) return;

      agregarEvento(
        data.descripcion,
        mapearTipo(data.tipo),
        data.timestamp
      );
    });

    primeraCarga = false;
    return;
  }

  // 🔹 eventos nuevos en tiempo real
  snapshot.docChanges().forEach((change) => {

    if (change.type === "added") {
      const data = change.doc.data();

      if (!data.timestamp) return;

      agregarEvento(
        data.descripcion,
        mapearTipo(data.tipo),
        data.timestamp
      );
    }

  });


});

// =========================
// Datos en vivo desde RTDB
// =========================

let data = {
    temperatura1: 0,
    temperatura2: 0,
    temperaturaExterior: 0,
    tensionL1: 0,
    tensionL2: 0,
    tensionL3: 0,
    corrienteL1: 0,
    corrienteL2: 0,
    corrienteL3: 0,
    potenciaAparente: 0
};

onValue(ref(db, "camara/actual"), (snapshot) => {
    const firebaseData = snapshot.val();
    if (!firebaseData) return;
    data = firebaseData;
});

// =========================

// =========================

const CONFIGS = {
    temp24:  { container: "container-1", rangoMs: 24*60*60*1000,    intervalo: 600000,   titulo: "Histórico de Temperaturas (24 hs)", campos: ["temperatura1","temperatura2","promedio","temperaturaExterior"] },

    temp30:  { container: "container-3", rangoMs: 30*24*60*60*1000, intervalo: 14400000, titulo: "Histórico de Temperaturas (1 Mes)", campos: ["temperatura1","temperatura2","promedio","temperaturaExterior"] },
    
    tens24:  { container: "container-4", rangoMs: 24*60*60*1000,    intervalo: 600000,   titulo: "Histórico de Tensiones (24 hs)", campos: ["tensionL1","tensionL2","tensionL3"] },
    tens7:   { container: "container-5", rangoMs: 7*24*60*60*1000,  intervalo: 7200000,  titulo: "Histórico de Tensiones (1 Semana)", campos: ["tensionL1","tensionL2","tensionL3"] },
    tens30:  { container: "container-6", rangoMs: 30*24*60*60*1000, intervalo: 14400000, titulo: "Histórico de Tensiones (1 Mes)", campos: ["tensionL1","tensionL2","tensionL3"] },

    corr24:  { container: "container-7", rangoMs: 24*60*60*1000,    intervalo: 600000,   titulo: "Histórico de Corrientes (24 hs)", campos: ["corrienteL1","corrienteL2","corrienteL3"] },
    corr7:   { container: "container-8", rangoMs: 7*24*60*60*1000,  intervalo: 7200000,  titulo: "Histórico de Corrientes (1 Semana)", campos: ["corrienteL1","corrienteL2","corrienteL3"] },
    corr30:  { container: "container-9", rangoMs: 30*24*60*60*1000, intervalo: 14400000, titulo: "Histórico de Corrientes (1 Mes)", campos: ["corrienteL1","corrienteL2","corrienteL3"] },

    pot24:   { container: "container-10", rangoMs: 24*60*60*1000,   intervalo: 600000,   titulo: "Histórico de Potencias (24 hs)", campos: ["potenciaAparente" ] },
    pot7:    { container: "container-11", rangoMs: 7*24*60*60*1000, intervalo: 7200000,  titulo: "Histórico de Potencias (1 Semana)", campos: ["potenciaAparente" ] },
    pot30:   { container: "container-12", rangoMs: 30*24*60*60*1000,intervalo: 14400000, titulo: "Histórico de Potencias (1 Mes)", campos: ["potenciaAparente" ] }
    
    };

// =========================
// Cargar histórico Firestore
// =========================

async function cargarHistorico(campos, rangoMs) {

    const fechaInicio = new Date(Date.now() - rangoMs);

    const q = query(
        collection(firestore, "historial"),
        where("timestamp", ">=", fechaInicio),
        orderBy("timestamp", "asc")
    );

    const snapshot = await getDocs(q);

    const series = campos.map(() => []);

    snapshot.forEach(doc => {
        const d = doc.data();
        if (!d.timestamp) return;

        const x = d.timestamp.toDate().getTime();

        campos.forEach((campo, i) => {

            let y = null;

            if (campo === "promedio") {
                if (d.temperatura1 != null && d.temperatura2 != null)
                    y = ((d.temperatura1 + d.temperatura2) / 2) / 10;
            } else if (d[campo] != null) {
                y = campo.startsWith("temperatura")
                    ? d[campo] / 10
                    : d[campo];
            }

            if (y != null)
                series[i].push([x, y]);
        });
    });

    return series;
}


// =========================
// animacion de carga
// =========================

function mostrarLoading(containerId) {
    const cont = document.getElementById(containerId);

    const overlay = document.createElement("div");
    overlay.className = "chart-loading-overlay";
    overlay.innerHTML = `
        <div class="spinner"></div>
        <div style="margin-top:8px;">Cargando...</div>
    `;

    cont.style.position = "relative";
    cont.appendChild(overlay);
}

function ocultarLoading(containerId) {
    const cont = document.getElementById(containerId);
    const overlay = cont.querySelector(".chart-loading-overlay");
    if (overlay) overlay.remove();
}

// =========================
// Crear gráfico genérico
// =========================

async function crearGrafico(config) {

        mostrarLoading(config.container);

    const seriesData = await cargarHistorico(config.campos, config.rangoMs);

    Highcharts.chart(config.container, {

        chart: {
            type: "spline",
            //zoomType: config.puntos > 100 ? "x" : undefined,
            events: {
                load: function () {
                        ocultarLoading(config.container);
                    const chart = this;

                    setInterval(() => {

                        const x = Date.now();
                        //const shift = chart.series[0].data.length >= config.puntos;

                        config.campos.forEach((campo, i) => {

                            let y;

                            if (campo === "promedio") {
                                y = ((data.temperatura1 + data.temperatura2) / 2);
                                } else {
                                 y = data[campo];

                                    if (campo.startsWith("temperatura"))
                                        y = y;
                                }

                            chart.series[i].addPoint([x, y], true, shift);
                        });

                    }, config.intervalo);
                }
            }
        },

        time: { useUTC: false },

        title: { text: config.titulo },

        xAxis: { type: "datetime" },

        yAxis: {
            title: { text: "" }
        },

        legend: { enabled: true },
        exporting: { enabled: false },

        series: config.campos.map((campo, i) => ({
            name: campo,
            data: seriesData[i],
            dashStyle: campo === "promedio" ? "ShortDash" : "Solid"
        }))
    });
}

// =========================
// Inicialización
// =========================

document.addEventListener("DOMContentLoaded", () => {

    Object.values(CONFIGS).forEach(cfg => {
        crearGrafico(cfg);
    });

});
</script>
